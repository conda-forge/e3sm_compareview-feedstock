schema_version: 1

context:
  python_min: "3.11"
  version: "1.8.0"

package:
  name: e3sm_compareview
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/e/e3sm_compareview/e3sm_compareview-${{ version }}.tar.gz
  sha256: cb027c0860e7dee046201a27c393c73001711f090b6a64d6f9362f72c56910dd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - compareview = e3sm_compareview.app:main
      - quickcompare = e3sm_compareview.app:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - e3sm-quickview >=2.7.7
    - trame-colormaps >=1.4.2

tests:
  - python:
      imports:
        - e3sm_compareview
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - compareview --help
      - quickcompare --help

about:
  summary: An application to explore/analyze data for atmosphere component for E3SM
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/e3sm-compareview/

extra:
  recipe-maintainers:
    - jourdain
    - willdunklin
